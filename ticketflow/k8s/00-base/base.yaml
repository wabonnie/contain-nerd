# =============================================================================
# TicketFlow — base: namespace, config, secrets
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: ticketflow
---
# Non-sensitive shared configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketflow-config
  namespace: ticketflow
data:
  LOG_LEVEL: "info"
  JWT_EXPIRES_IN: "2h"
  RABBITMQ_EXCHANGE: "ticketflow.events"
  RABBITMQ_QUEUE: "notifications.order-created"
  AUTH_DB_NAME: "auth_db"
  EVENTS_DB_NAME: "events_db"
  ORDERS_DB_NAME: "orders_db"
  NOTIF_DB_NAME: "notifications_db"
---
# Sensitive values (dev defaults — change for anything beyond local!)
apiVersion: v1
kind: Secret
metadata:
  name: ticketflow-secrets
  namespace: ticketflow
type: Opaque
stringData:
  JWT_SECRET: "change-me-with-a-long-random-string"
  RABBITMQ_USER: "guest"
  RABBITMQ_PASS: "guest"
  AUTH_DB_USER: "auth_user"
  AUTH_DB_PASSWORD: "auth_pass"
  EVENTS_DB_USER: "events_user"
  EVENTS_DB_PASSWORD: "events_pass"
  ORDERS_DB_USER: "orders_user"
  ORDERS_DB_PASSWORD: "orders_pass"
