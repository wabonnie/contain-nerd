# =============================================================================
# MongoDB for service-notifications
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mongo-notifications
  namespace: ticketflow
spec:
  selector:
    app: mongo-notifications
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-notifications
  namespace: ticketflow
spec:
  serviceName: mongo-notifications
  replicas: 1
  selector:
    matchLabels:
      app: mongo-notifications
  template:
    metadata:
      labels:
        app: mongo-notifications
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: NOTIF_DB_NAME }
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: init-js
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: init-js
          configMap:
            name: mongo-init-js
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
