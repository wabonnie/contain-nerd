# =============================================================================
# PostgreSQL for service-events
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-events
  namespace: ticketflow
spec:
  selector:
    app: postgres-events
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-events
  namespace: ticketflow
spec:
  serviceName: postgres-events
  replicas: 1
  selector:
    matchLabels:
      app: postgres-events
  template:
    metadata:
      labels:
        app: postgres-events
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: EVENTS_DB_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: EVENTS_DB_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: EVENTS_DB_NAME }
            # PGDATA in a subdir so the volume's lost+found doesn't break initdb
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pg-events-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: init-sql
          configMap:
            name: events-init-sql
  volumeClaimTemplates:
    - metadata:
        name: pg-events-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
