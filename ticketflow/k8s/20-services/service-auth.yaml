# =============================================================================
# service-auth (Node.js + Express + PostgreSQL)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: service-auth
  namespace: ticketflow
spec:
  selector:
    app: service-auth
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-auth
  namespace: ticketflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-auth
  template:
    metadata:
      labels:
        app: service-auth
    spec:
      containers:
        - name: service-auth
          image: ticketflow/service-auth:1.0
          imagePullPolicy: IfNotPresent   # image is built locally into Rancher Desktop
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: postgres-auth
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: AUTH_DB_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: AUTH_DB_PASSWORD }
            - name: DB_NAME
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: AUTH_DB_NAME }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: JWT_SECRET }
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: JWT_EXPIRES_IN }
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: LOG_LEVEL }
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 30
