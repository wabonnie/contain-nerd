# =============================================================================
# service-notifications (Python + FastAPI + MongoDB + RabbitMQ consumer)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: service-notifications
  namespace: ticketflow
spec:
  selector:
    app: service-notifications
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-notifications
  namespace: ticketflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-notifications
  template:
    metadata:
      labels:
        app: service-notifications
    spec:
      containers:
        - name: service-notifications
          image: localhost:5050/ticketflow/service-notifications:1.0
          imagePullPolicy: Always   # pulled from the local Docker registry — runtime-agnostic (Docker, containerd, etc.)
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URL
              value: mongodb://mongo-notifications:27017
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: NOTIF_DB_NAME }
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: RABBITMQ_USER }
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: RABBITMQ_PASS }
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672/"
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: RABBITMQ_EXCHANGE }
            - name: RABBITMQ_QUEUE
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: RABBITMQ_QUEUE }
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: LOG_LEVEL }
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
