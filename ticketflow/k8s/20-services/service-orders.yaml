# =============================================================================
# service-orders (Python + FastAPI + PostgreSQL + RabbitMQ producer)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: service-orders
  namespace: ticketflow
spec:
  selector:
    app: service-orders
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-orders
  namespace: ticketflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-orders
  template:
    metadata:
      labels:
        app: service-orders
    spec:
      containers:
        - name: service-orders
          image: localhost:5000/ticketflow/service-orders:1.0
          imagePullPolicy: Always   # pulled from the local Docker registry — runtime-agnostic (Docker, containerd, etc.)
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: postgres-orders
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: ORDERS_DB_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: ORDERS_DB_PASSWORD }
            - name: DB_NAME
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: ORDERS_DB_NAME }
            - name: EVENTS_SERVICE_URL
              value: http://service-events:8000
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: RABBITMQ_USER }
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef: { name: ticketflow-secrets, key: RABBITMQ_PASS }
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672/"
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: RABBITMQ_EXCHANGE }
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef: { name: ticketflow-config, key: LOG_LEVEL }
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
